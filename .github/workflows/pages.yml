name: Deploy to GitHub Pages

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          SITE_DIR="_site"
          mkdir -p "$SITE_DIR"
          copy_items=(
            index.html
            install.sh
            boot.sh
            bootstrap.sh
            bin
            config
            default
            install
            migrations
            applications
            autostart
            version
            .nojekyll
            icon.png
            logo.svg
          )

          for item in "${copy_items[@]}"; do
            [[ -e $item ]] || continue
            if [[ -d $item ]]; then
              cp -r "$item" "$SITE_DIR/"
            else
              cp "$item" "$SITE_DIR/"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
